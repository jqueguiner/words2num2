# Auto-publish hook: when CI succeeds on main, build the package and
# publish to PyPI, skipping versions that are already present. Tag-based
# releases via release.yml are still the primary path; this workflow is
# a safety net for one-off pushes that bumped the version without a tag.
name: Upload Python Package

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine setuptools_scm

    - name: Detect current version (from setuptools_scm)
      id: ver
      run: |
        VER=$(python -c "from setuptools_scm import get_version; print(get_version())")
        echo "version=$VER" >> $GITHUB_OUTPUT
        echo "Detected version: $VER"

    - name: Check if already on PyPI
      id: check
      run: |
        if pip index versions words2num2 2>/dev/null | grep -q "${{ steps.ver.outputs.version }}"; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Build package
      if: steps.check.outputs.exists == 'false'
      run: python -m build

    - name: Publish to PyPI
      if: steps.check.outputs.exists == 'false'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: twine upload --skip-existing dist/* --verbose
