name: Lint

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 isort black mypy

    - name: Check code formatting with Black
      run: |
        black --check --diff words2num2 tests
      continue-on-error: true

    - name: Lint with flake8
      run: |
        flake8 words2num2 tests --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 words2num2 tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check import sorting with isort
      run: |
        isort --check-only --diff words2num2 tests
      continue-on-error: true

    - name: Type checking with mypy
      run: |
        mypy words2num2 --ignore-missing-imports
      continue-on-error: true
