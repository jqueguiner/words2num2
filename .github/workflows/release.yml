name: Build and Release

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # For setuptools_scm

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build setuptools wheel setuptools_scm

    - name: Build distribution
      run: |
        python -m build
        ls -la dist/

    - name: Check build
      run: |
        pip install twine
        twine check dist/*

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  test-package:
    name: Test Built Package
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - name: Test installation
      run: |
        pip install dist/*.whl
        python -c "import words2num2; print('Version:', getattr(words2num2, '__version__', 'not set'))"
        python -c "from words2num2 import words2num; print('English forty-two:', words2num('forty-two'))"
        python -c "from words2num2 import words2num; print('French quarante-deux:', words2num('quarante-deux', lang='fr'))"
        python -c "from words2num2 import words2num_sentence; print('Sentence:', words2num_sentence('I bought twenty-three apples and fourteen pears.'))"

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, test-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - name: Generate Release Notes
      id: release_notes
      run: |
        cat > release_notes.md << 'EOF'
        ## words2num2 — inverse of num2words2

        Convert spoken-form numbers back to numeric values across 100+
        locales. Auto-generated release.

        ### Installation
        ```bash
        pip install words2num2
        ```

        ### Usage
        ```python
        from words2num2 import words2num, words2num_sentence

        words2num("forty-two")                          # 42
        words2num("one thousand two hundred")           # 1200
        words2num("quarante-deux", lang="fr")           # 42
        words2num("zweiundvierzig", lang="de")          # 42
        words2num_sentence("I bought twenty-three apples and fourteen pears.")
        # 'I bought 23 apples and 14 pears.'
        ```
        EOF

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        body_path: release_notes.md
        files: dist/*
        draft: false
        prerelease: false
        generate_release_notes: true

  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, test-package, release]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/words2num2/
    permissions:
      id-token: write

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - name: Check package versions
      run: |
        ls -la dist/
        for file in dist/*; do
          echo "Package: $file"
          if [[ $file == *"+g"* ]]; then
            echo "ERROR: Local version identifier found in package name!"
            echo "This usually means no proper git tag exists."
            echo "Please create a release tag first: git tag -a v1.0.0 -m 'Release v1.0.0'"
            exit 1
          fi
        done

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        skip-existing: true
