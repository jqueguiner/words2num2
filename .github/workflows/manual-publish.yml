# Manual workflow to publish to PyPI without going through a tag.
# Useful for hotfixes or test-PyPI dry runs.
name: Manual PyPI Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.2.2)'
        required: true
        type: string
      test_pypi:
        description: 'Publish to Test PyPI first?'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      env:
        SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.version }}
      run: |
        python -m build
        ls -la dist/

    - name: Check distribution
      run: twine check dist/*

    - name: Publish to Test PyPI
      if: inputs.test_pypi
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
      run: |
        twine upload --repository testpypi dist/* --verbose
        echo "Install with: pip install --index-url https://test.pypi.org/simple/ words2num2==${{ inputs.version }}"

    - name: Publish to PyPI
      if: success()
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        twine upload dist/* --verbose
        echo "Install with: pip install words2num2==${{ inputs.version }}"
